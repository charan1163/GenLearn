<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenLearn - Redirecting...</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>GenLearn</h1>
        <p>Redirecting to the application...</p>
        <p>If you're not redirected automatically, <a href="https://charan1163.github.io/GenLearn/" style="color: #fff; text-decoration: underline;">click here</a></p>
    </div>
    
    <script>
        // Try to redirect to the GitHub Pages URL, but fallback to client directory
        setTimeout(function() {
            // Check if we're already on GitHub Pages
            if (window.location.hostname.includes('github.io')) {
                // We're on GitHub Pages, try to load the client directory
                window.location.href = './client/';
            } else {
                // We're on the main repository, redirect to GitHub Pages
                window.location.href = 'https://charan1163.github.io/GenLearn/';
            }
        }, 2000);
    </script>
</body>
</html>
